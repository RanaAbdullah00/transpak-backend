# TransPak backend only — use this file when THIS FOLDER is the Git repository root
# (no parent monorepo). If your repo root is the FYP folder instead, use ../render.yaml there.
#
# After first deploy: Shell → npm run db:migrate:otp
# Set CORS_ORIGIN in the Dashboard (required for browser + Socket.io).

databases:
  - name: transpak-db
    plan: free
    databaseName: transpak

services:
  - type: web
    name: transpak-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: transpak-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
